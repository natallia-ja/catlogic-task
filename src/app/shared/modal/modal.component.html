<div class="back" *ngIf="isOpen">
  <div class="modal">
    <div class="modal-header">
      <div class="font-text-bold">{{ modalTitle }}</div>
    </div>
    <div class="modal-body">
      <ng-content></ng-content>
    </div>
    <div class="modal-footer">
      <button
        class="save-button"
        (click)="onConfirm()"
      >
        {{ confirmButtonName }}
      </button>
      <button (click)="onCancel()">
        {{ cancelButtonName }}
      </button>
    </div>
  </div>
</div>
