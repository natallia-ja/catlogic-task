<div class="back" *ngIf="isOpen">
  <div class="modal">
    <div class="modal-header">
      <h3>{{ modalTitle }}</h3>
      <!--<button (click)="onCancel()">×</button>-->
    </div>

    <div class="modal-body">
      <ng-content></ng-content>
    </div>

    <div class="modal-footer">
      <button (click)="onCancel()">
        {{ cancelButtonName }}
      </button>

      <button (click)="onConfirm()">
        {{ confirmButtonName }}
      </button>
    </div>

  </div>
</div>
